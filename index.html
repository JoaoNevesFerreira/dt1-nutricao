const CATS=[
  {id:'all',i:'🍽️',k:'catAll'},{id:'pao',i:'🍞',k:'catPao'},{id:'frutas',i:'🍎',k:'catFrutas'},
  {id:'legumes',i:'🥦',k:'catLegumes'},{id:'leguminosas',i:'🫘',k:'catLeg'},{id:'laticinios',i:'🥛',k:'catLat'},
  {id:'carnes',i:'🍖',k:'catCarnes'},{id:'sopas',i:'🥣',k:'catSopas'},{id:'tipicos',i:'🍲',k:'catTipicos'},
  {id:'doces',i:'🍰',k:'catDoces'},{id:'bebidas',i:'🥤',k:'catBebidas'},{id:'snacks',i:'🥜',k:'catSnacks'},
];

const N=v=>Math.round(v*10)/10;
const pct=(food,qty,k)=>N(food[k]*qty/100);
const calcFPU=(fat,pro)=>N((fat*9+pro*4)/10);
const giLabel=(gi,t)=>!gi?null:gi<55?{l:t.giLow,c:'#06D6A0'}:gi<70?{l:t.giMed,c:'#FFB703'}:{l:t.giHigh,c:'#EF233C'};
const sumMeal=items=>items.reduce((a,{food,qty})=>({
  hc:N(a.hc+pct(food,qty,'hc')),cal:N(a.cal+pct(food,qty,'cal')),
  fat:N(a.fat+pct(food,qty,'fat')),pro:N(a.pro+pct(food,qty,'pro')),fib:N(a.fib+pct(food,qty,'fib'))
}),{hc:0,cal:0,fat:0,pro:0,fib:0});
const fname=(food,lang)=>lang==='en'&&food.en?food.en:food.n;

// Storage helpers (localStorage for standalone)
const store={
  get:k=>{try{return localStorage.getItem(k);}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}}
};

function App(){
  const [tab,setTab]=useState('search');
  const [meal,setMeal]=useState([]);
  const [allFoods,setAllFoods]=useState(FOODS);
  const [sett,setSett]=useState({insulinRatio:10});
  const [hist,setHist]=useState([]);
  const [sel,setSel]=useState(null);
  const [showC,setShowC]=useState(false);
  const [lang,setLang]=useState('pt');
  const [apiKey,setApiKey]=useState('');
  const t=i18n[lang];

  useEffect(()=>{
    const s=store.get('dt1:sett'); if(s)setSett(JSON.parse(s));
    const h=store.get('dt1:hist'); if(h)setHist(JSON.parse(h));
    const c=store.get('dt1:custom'); if(c)setAllFoods([...FOODS,...JSON.parse(c)]);
    const l=store.get('dt1:lang'); if(l)setLang(l);
    const k=store.get('dt1:apikey'); if(k)setApiKey(k);
  },[]);

  const ps=(k,v)=>store.set(k,JSON.stringify(v));
  const addToMeal=(food,qty,nav=true)=>{
    setMeal(p=>{const i=p.findIndex(x=>x.food.id===food.id);if(i>=0){const u=[...p];u[i]={food,qty:N(u[i].qty+qty)};return u;}return[...p,{food,qty}];});
    setSel(null);if(nav)setTab('meal');
  };
  const addPhotoItems=items=>{items.forEach(it=>addToMeal(it.food,it.qty,false));setTab('meal');};
  const saveMeal=()=>{
    if(!meal.length)return;
    const totals=sumMeal(meal);
    const lo=lang==='en'?'en-GB':'pt-PT';
    const entry={id:Date.now(),date:new Date().toLocaleDateString(lo),time:new Date().toLocaleTimeString(lo,{hour:'2-digit',minute:'2-digit'}),items:meal,totals};
    const h=[entry,...hist].slice(0,60);
    setHist(h);ps('dt1:hist',h);setMeal([]);setTab('history');
  };
  const addCustom=food=>{
    const f={...food,id:Date.now(),src:'CUSTOM'};
    const upd=[...allFoods,f];setAllFoods(upd);
    ps('dt1:custom',upd.filter(x=>!FOODS.find(b=>b.id===x.id)));
    setShowC(false);
  };
  const saveSett=s=>{setSett(s);ps('dt1:sett',s);};
  const saveApiKey=k=>{setApiKey(k);store.set('dt1:apikey',k);};
  const toggleLang=()=>{const nl=lang==='pt'?'en':'pt';setLang(nl);store.set('dt1:lang',nl);};

  return(
    <LangCtx.Provider value={lang}>
      <div style={{fontFamily:'"DM Sans",sans-serif',background:T.navy,minHeight:'100vh',maxWidth:480,margin:'0 auto',color:T.white,paddingBottom:80,paddingTop:'env(safe-area-inset-top)'}}>
        {tab==='search'  &&<SearchTab   foods={allFoods} onSelect={setSel} t={t}/>}

function PhotoTab({onAddItems,t,apiKey}){
  const lang=useLang();
  const [img,setImg]=useState(null);
  const [imgB64,setImgB64]=useState(null);
  const [imgType,setImgType]=useState('image/jpeg');
  const [loading,setLoading]=useState(false);
  const [foods,setFoods]=useState(null);
  const [err,setErr]=useState('');
  const [added,setAdded]=useState(new Set());
  const fileRef=useRef();
  const camRef=useRef();

  const handleFile=async(file)=>{
    if(!file||!file.type.startsWith('image/'))return;
    setFoods(null);setErr('');setAdded(new Set());
    const mType=file.type||'image/jpeg';
    setImgType(mType);
    const reader=new FileReader();
    reader.onload=async(e)=>{
      const dataUrl=e.target.result;
      setImg(dataUrl);
      const b64=dataUrl.split(',')[1

];
      setImgB64(b64);
      await analyzeImage(b64,mType);
    };
    reader.readAsDataURL(file);
  };

  const analyzeImage=async(b64,mType)=>{
    if(!apiKey){setErr(t.noApiKey);return;}
    setLoading(true);setErr('');
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({
          model:'claude-opus-4-6',
          max_tokens:1500,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mType,data:b64}},
            {type:'text',text:t.photoPrompt}
          ]}]
        })
      });
      const data=await res.json();
      const text=data.content?.map(b=>b.text||'').join('')||'';
      const match=text.match(/\{[\s\S]*\}/);
      if(!match)throw new Error('no json');
      const parsed=JSON.parse(match[0]);
      if(!parsed.foods||!parsed.foods.length){setErr(t.noFoodDetected);setLoading(false);return;}
      setFoods(parsed.foods);
    }catch(e){setErr(t.photoError);}
    setLoading(false);
  };

  const totalHC=foods?foods.reduce((s,f)=>s+Number(f.hc_total||0),0).toFixed(1):0;
  const totalCal=foods?foods.reduce((s,f)=>s+Number(f.cal_total||0),0).toFixed(0):0;

  const makeMealFood=item=>({
    id:'ph_'+Date.now()+'_'+Math.random(),
    n:item.name,en:item.name,c:'tipicos',
    hc:item.hc_total&&item.portion_g?N(item.hc_total/item.portion_g*100):item.hc_total||0,
    cal:item.cal_total&&item.portion_g?N(item.cal_total/item.portion_g*100):item.cal_total||0,
    fat:0,pro:0,fib:0,gi:0,u:'g',e:item.emoji||'🍽️',src:'PHOTO'
  });

  const addSingle=(item,idx)=>{
    onAddItems([{food:makeMealFood(item),qty:Math.round(item.portion_g)||100}]);
    setAdded(p=>new Set([...p,idx]));
  };
  const addAll=()=>onAddItems(foods.map(it=>({food:makeMealFood(it),qty:Math.round(it.portion_g)||100})));
  const reset=()=>{setImg(null);setImgB64(null);setFoods(null);setErr('');setAdded(new Set());};

  return(
    <div>
      <div style={{background:'linear-gradient(160deg,#1A0A2E,#2D1B69)',padding:'16px 16px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
        <div style={{display:'flex',alignItems:'center',gap:13}}>
          <div style={{width:50,height:50,borderRadius:16,background:'linear-gradient(135deg,#9333EA,#6B21A8)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,boxShadow:'0 4px 20px rgba(147,51,234,0.5)',animation:'pulse 2.5s infinite'}}>📸</div>
          <div>
            <div style={{fontFamily:'Outfit',fontWeight:900,fontSize:20,letterSpacing:-.5,background:'linear-gradient(90deg,#fff,#C084FC)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>{t.photoTitle}</div>
            <div style={{color:'#A78BFA',fontSize:11.5,marginTop:2,lineHeight:1.4,maxWidth:260}}>{t.photoSubtitle}</div>
          </div>
        </div>
      </div>
      <div style={{padding:16}}>
        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])} onClick={e=>e.target.value=''}/>
        <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])} onClick={e=>e.target.value=''}/>
        {!img?(
          <div>
            {!apiKey&&<div style={{background:'rgba(239,35,60,0.1)',borderRadius:14,padding:13,marginBottom:16,border:'1px solid rgba(239,35,60,0.25)',fontSize:12.5,color:'#FF6B8A'}}>{t.noApiKey}</div>}
            <div style={{background:'rgba(148,33,233,0.1)',borderRadius:16,padding:14,marginBottom:16,border:'1px solid rgba(148,33,233,0.2)',fontSize:13,color:'#C084FC',lineHeight:1.7}}>{t.photoTip}</div>

            {foods&&!loading&&(
              <div className="up">
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
                  {[{l:t.totalHC,v:totalHC+'g',c:T.teal,bg:'rgba(0,180,216,0.15)'},{l:'kcal',v:totalCal,c:T.coral,bg:'rgba(244,132,95,0.15)'},{l:lang==='pt'?'alimentos':'foods',v:foods.length,c:'#C084FC',bg:'rgba(148,33,233,0.15)'}].map(({l,v,c,bg})=>(
                    <div key={l} style={{background:bg,borderRadius:14,padding:'12px 6px',textAlign:'center',border:`1px solid ${c}33`}}>
                      <div style={{fontFamily:'Outfit',fontWeight:900,fontSize:20,color:c}}>{v}</div>
                      <div style={{fontSize:10,color:T.slate,marginTop:3,lineHeight:1.3}}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:15,marginBottom:10}}>{t.photoResult}</div>
                {foods.map((item,idx)=>(
                  <div key={idx} className="up" style={{display:'flex',alignItems:'center',gap:11,padding:'12px 14px',background:added.has(idx)?'rgba(6,214,160,0.08)':T.card,borderRadius:15,marginBottom:8,border:`1px solid ${added.has(idx)?'rgba(6,214,160,0.25)':'rgba(255,255,255,0.07)'}`,animationDelay:`${idx*60}ms`,transition:'all .2s'}}>
                    <div style={{width:48,height:48,borderRadius:13,background:'rgba(255,255,255,0.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>{item.emoji||'🍽️'}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</div>
                      <div style={{fontSize:12,color:T.slate,marginTop:2}}>{t.portionEst}: ~{Math.round(item.portion_g)||'?'}g</div>
                      <div style={{display:'flex',gap:8,marginTop:4}}>
                        <span style={{fontSize:12.5,color:T.tealL,fontWeight:700,fontFamily:'Outfit'}}>🔵 {Number(item.hc_total||0).toFixed(1)}g {t.hc}</span>
                        <span style={{fontSize:11.5,color:T.slate}}>🔥 {Math.round(item.cal_total||0)} kcal</span>
                      </div>
                    </div>
                    <button onClick={()=>addSingle(item,idx)} style={{flexShrink:0,padding:'9px 13px',background:added.has(idx)?`${T.green}22`:'rgba(0,180,216,0.12)',color:added.has(idx)?T.green:T.teal,border:`1px solid ${added.has(idx)?T.green+'44':T.teal+'44'}`,borderRadius:10,cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'Outfit',transition:'all .2s',whiteSpace:'nowrap'}}>
                      {added.has(idx)?'✓':t.addItem}
                    </button>
                  </div>
                ))}
                <div style={{background:'rgba(255,183,3,0.08)',borderRadius:14,padding:12,marginBottom:14,border:`1px solid ${T.amber}33`,fontSize:12,color:T.slate,lineHeight:1.65}}>{t.photoWarning}</div>
                <div style={{display:'flex',gap:10}}>
                  <button onClick={addAll} style={{flex:1,padding:'15px',background:'linear-gradient(135deg,#9333EA,#6B21A8)',color:T.white,border:'none',borderRadius:16,fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'Outfit',boxShadow:'0 6px 20px rgba(147,51,234,0.4)'}}>{t.addAll}</button>
                  <button onClick={reset} style={{padding:'15px 18px',background:'rgba(255,255,255,0.07)',color:T.slate,border:'1px solid rgba(255,255,255,0.12)',borderRadius:16,cursor:'pointer',fontSize:18}}>🔄</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function MealTab({meal,setMeal,sett,onSave,t,apiKey}){
  const lang=useLang();
  const totals=sumMeal(meal);
  const fpu=calcFPU(totals.fat,totals.pro);
  const insulin=N(totals.hc/sett.insulinRatio);
  const [ai,setAI]=useState('');
  const [loadAI,setLA]=useState(false);
  const consultAI=async()=>{
    if(!meal.length)return;
    if(!apiKey){setAI(t.noApiKey);return;}
    setLA(true);setAI('');
    try{
      const desc=meal.map(({food,qty})=>`${fname(food,lang)}:${qty}${food.u}`).join(', ');
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-opus-4-6',max_tokens:1000,messages:[{role:'user',content:t.aiPrompt(desc,totals,fpu,insulin,sett.insulinRatio)}]})});
      const d=await r.json();setAI(d.content?.map(b=>b.text||'').join('')||'—');
    }catch(e){setAI(t.aiErr);}
    setLA(false);
  };
  if(!meal.length)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'75vh',padding:32,textAlign:'center'}}><div style={{fontSize:72,marginBottom:20}}>🍽️</div><div style={{fontFamily:'Outfit',fontWeight:800,fontSize:22,marginBottom:10}}>{t.emptyMeal}</div><div style={{fontSize:14,color:T.slate,lineHeight:1.7,maxWidth:280}}>{t.emptyMealSub}</div></div>);
  return(
    <div style={{paddingBottom:16}}>
      <div style={{background:'linear-gradient(150deg,#0D3D63,#0A2A45)',padding:'18px 16px 20px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
        <div style={{fontFamily:'Outfit',fontWeight:900,fontSize:20,marginBottom:16}}>{t.myMeal}</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          {[[t.hc,totals.hc+'g',T.teal],[t.calories,totals.cal+' kcal',T.coral],[t.fpu,fpu.toFixed(1),T.amber],[t.fat,totals.fat+'g',T.red],[t.protein,totals.pro+'g',T.green],[t.insulin,insulin+'U',T.white]].map(([l,v,col])=>(
            <div key={l} style={{background:'rgba(255,255,255,0.07)',borderRadius:14,padding:'12px 8px',textAlign:'center',border:'1px solid rgba(255,255,255,0.09)'}}>
              <div style={{color:col,fontWeight:900,fontSize:16,fontFamily:'Outfit'}}>{v}</div>
              <div style={{color:T.slate,fontSize:10,marginTop:3}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{padding:'12px 16px 0'}}>
        {meal.map(({food,qty},i)=>{const hc=pct(food,qty,'hc'),cal=pct(food,qty,'cal');return(
          <div key={i} className="up" style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:T.card,borderRadius:15,marginBottom:8,border:'1px solid rgba(255,255,255,0.07)',animationDelay:`${i*40}ms`}}>
            <div style={{width:46,height:46,borderRadius:12,background:'rgba(255,255,255,0.07)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,flexShrink:0}}>{food.e}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fname(food,lang)}</div>
              <div style={{fontSize:12,color:T.slate,marginTop:3}}>{qty}{food.u} · <span style={{color:T.tealL,fontWeight:700,fontFamily:'Outfit'}}>{hc}g {t.hc}</span> · {cal} kcal</div>
            </div>
            <button onClick={()=>setMeal(p=>p.filter((_,j)=>j!==i))} style={{background:'rgba(239,35,60,0.15)',border:'1px solid rgba(239,35,60,0.25)',borderRadius:9,padding:'7px 12px',cursor:'pointer',color:T.red,fontWeight:700,fontSize:14}}>✕</button>
          </div>
        );})}
      </div>
      <div style={{padding:'12px 16px 0'}}>
        <button onClick={consultAI} disabled={loadAI} style={{width:'100%',padding:'14px',background:loadAI?'rgba(255,255,255,0.08)':'linear-gradient(135deg,#6B21A8,#9333EA)',color:T.white,border:'none',borderRadius:14,fontSize:14,fontWeight:700,cursor:loadAI?'not-allowed':'pointer',fontFamily:'Outfit',boxShadow:loadAI?'none':'0 4px 16px rgba(107,33,168,0.4)'}}>{loadAI?t.analyzingAI:t.askAI}</button>
        {ai&&<div className="up" style={{background:'rgba(107,33,168,0.15)',borderRadius:16,padding:16,marginTop:10,border:'1px solid rgba(107,33,168,0.3)'}}><div style={{fontSize:10,fontWeight:800,color:'#C084FC',letterSpacing:1.5,marginBottom:10,fontFamily:'Outfit'}}>{t.aiLabel}</div><div style={{fontSize:13.5,color:T.offW,whiteSpace:'pre-wrap',lineHeight:1.8}}>{ai}</div></div>}
      </div>
      <div style={{padding:'12px 16px 0'}}>
        <button onClick={onSave} style={{width:'100%',padding:'15px',background:`linear-gradient(135deg,${T.green},#059669)`,color:T.white,border:'none',borderRadius:16,fontSize:16,fontWeight:800,cursor:'pointer',fontFamily:'Outfit',boxShadow:`0 6px 20px rgba(6,214,160,0.35)`}}>{t.saveMeal}</button>
      </div>
    </div>
  );
}

function HistTab({hist,onClear,t}){
  const lang=useLang();
  if(!hist.length)return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'75vh',padding:32,textAlign:'center'}}><div style={{fontSize:64,marginBottom:16}}>📋</div><div style={{fontFamily:'Outfit',fontWeight:800,fontSize:20,marginBottom:8}}>{t.noHistory}</div><div style={{fontSize:14,color:T.slate}}>{t.noHistorySub}</div></div>);
  return(
    <div style={{padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontFamily:'Outfit',fontWeight:900,fontSize:20}}>{t.historyTitle}</div>
        <button onClick={onClear} style={{background:'rgba(239,35,60,0.15)',color:T.red,border:'1px solid rgba(239,35,60,0.25)',borderRadius:10,padding:'7px 14px',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'Outfit'}}>{t.clearAll}</button>
      </div>
      {hist.map((e,i)=>(
        <div key={e.id} className="up" style={{background:T.card,borderRadius:18,padding:15,marginBottom:10,border:'1px solid rgba(255,255,255,0.07)',animationDelay:`${i*30}ms`}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><span style={{fontFamily:'Outfit',fontWeight:800,fontSize:14}}>📅 {e.date}</span><span style={{color:T.slate,fontSize:13}}>🕐 {e.time}</span></div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
            {[{l:`${e.totals.hc}g ${t.hc}`,c:T.teal},{l:`${e.totals.cal} kcal`,c:T.coral},{l:`${calcFPU(e.totals.fat,e.totals.pro).toFixed(1)} ${t.fpu}`,c:T.amber}].map(({l,c})=>(
              <span key={l} style={{padding:'4px 10px',borderRadius:7,background:`${c}20`,color:c,fontSize:12,fontWeight:700,fontFamily:'Outfit'}}>{l}</span>
            ))}
          </div>
          <div style={{fontSize:12,color:T.slate,lineHeight:1.6,borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:9}}>{e.items.map(({food,qty})=>`${food.e} ${fname(food,lang)} (${qty}${food.u})`).join(' · ')}</div>
        </div>
      ))}
    </div>
  );
}

function SettTab({sett,onSave,onCustom,total,lang,onToggle,t,apiKey,onSaveKey}){
  const [ratio,setRatio]=useState(sett.insulinRatio);
  const [keyInput,setKeyInput]=useState(apiKey||'');
  const [keySaved,setKeySaved]=useState(false);
  const Card=({children})=><div style={{background:T.card,borderRadius:18,padding:18,marginBottom:12,border:'1px solid rgba(255,255,255,0.07)'}}>{children}</div>;
  const SL=({c})=><div style={{fontFamily:'Outfit',fontWeight:700,fontSize:15,marginBottom:4}}>{c}</div>;
  return(
    <div style={{padding:16}}>
      <div style={{fontFamily:'Outfit',fontWeight:900,fontSize:20,marginBottom:16}}>{t.settingsTitle}</div>
      <Card>
        <SL c={t.language}/>
        <div style={{display:'flex',gap:10,marginTop:12}}>
          {[['pt','🇵🇹 Português'],['en','🇬🇧 English']].map(([code,label])=>(
            <button key={code} onClick={()=>code!==lang&&onToggle()} style={{flex:1,padding:'14px 8px',borderRadius:14,border:'2px solid',borderColor:lang===code?T.teal:'rgba(255,255,255,0.12)',background:lang===code?`${T.teal}22`:'transparent',color:lang===code?T.tealL:T.slate,fontWeight:lang===code?800:500,fontSize:14,cursor:'pointer',fontFamily:'Outfit'}}>
              {label}
              {lang===code&&<div style={{fontSize:9,marginTop:5,color:T.teal,letterSpacing:1}}>✓ ATIVO</div>}
            </button>
          ))}
        </div>
      </Card>
      <Card>
        <SL c={t.apiKeyLabel}/>
        <div style={{fontSize:12,color:T.slate,marginBottom:12,lineHeight:1.6}}>{t.apiKeyNote}</div>
        <input type="password" value={keyInput} onChange={e=>{setKeyInput(e.target.value);setKeySaved(false);}} placeholder={t.apiKeyPlaceholder} style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'1.5px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.05)',color:T.white,fontSize:13,fontFamily:'"DM Sans",sans-serif',marginBottom:10}} onFocus={e=>e.target.style.borderColor=T.teal+'66'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.12)'}/>
        <button onClick={()=>{onSaveKey(keyInput);setKeySaved(true);}} style={{width:'100%',padding:'12px',background:keySaved?`${T.green}22`:`linear-gradient(135deg,${T.teal},#0077A8)`,color:keySaved?T.green:T.white,border:keySaved?`1px solid ${T.green}44`:'none',borderRadius:12,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Outfit'}}>
          {keySaved?'✓ Guardado!':t.apiKeySave}
        </button>
      </Card>
      <Card>
        <SL c={t.insulinRatio}/>
        <div style={{fontSize:12,color:T.slate,marginBottom:16}}>{t.insulinRatioSub}</div>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={()=>setRatio(r=>Math.max(1,r-1))} style={{width:48,height:48,borderRadius:24,border:`1.5px solid ${T.teal}55`,background:'rgba(0,180,216,0.08)',fontSize:24,cursor:'pointer',color:T.teal,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>−</button>
          <div style={{flex:1,textAlign:'center'}}><div style={{fontSize:44,fontWeight:900,color:T.teal,lineHeight:1,fontFamily:'Outfit'}}>{ratio}</div><div style={{fontSize:12,color:T.slate,marginTop:4}}>{t.gPer1u}</div></div>
          <button onClick={()=>setRatio(r=>r+1)} style={{width:48,height:48,borderRadius:24,border:`1.5px solid ${T.teal}55`,background:'rgba(0,180,216,0.08)',fontSize:24,cursor:'pointer',color:T.teal,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>+</button>
        </div>
        <input type="range" min={1} max={30} value={ratio} onChange={e=>setRatio(parseInt(e.target.value))} style={{width:'100%',marginTop:14,accentColor:T.teal}}/>
        <button onClick={()=>onSave({...sett,insulinRatio:ratio})} style={{width:'100%',marginTop:14,padding:'13px',background:`linear-gradient(135deg,${T.teal},#0077A8)`,color:T.white,border:'none',borderRadius:13,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:'Outfit',boxShadow:`0 4px 14px rgba(0,180,216,0.3)`}}>{t.save}</button>
      </Card>
      <Card>
        <SL c={t.customFood}/>
        <div style={{fontSize:12,color:T.slate,marginBottom:14}}>{t.customFoodSub}</div>
        <button onClick={onCustom} style={{width:'100%',padding:'13px',background:`linear-gradient(135deg,${T.coral},${T.coralD})`,color:T.white,border:'none',borderRadius:13,fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Outfit',boxShadow:`0 4px 14px rgba(244,132,95,0.3)`}}>{t.addFood}</button>
      </Card>
      <Card>
        <SL c={t.about}/>
        {t.aboutRows.map(([l,v])=>(<div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid rgba(255,255,255,0.05)'}}><span style={{fontSize:12.5,color:T.slate}}>{l}</span><span style={{fontSize:12.5,fontWeight:600,textAlign:'right',maxWidth:'55%'}}>{v.replace('%n',total)}</span></div>))}
        <div style={{fontSize:12,color:T.slate,marginTop:14,padding:'12px 14px',background:'rgba(255,183,3,0.08)',borderRadius:12,border:`1px solid ${T.amber}33`,lineHeight:1.7}}>{t.warning}</div>
      </Card>
    </div>
  );
}

function CustomModal({onClose,onSave,t}){
  const lang=useLang();
  const [f,setF]=useState({n:'',c:'tipicos',hc:'',cal:'',fat:'',pro:'',fib:'',gi:'',u:'g',e:'🍽️'});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const R=({label,k,type='number',ph})=>(<div style={{marginBottom:12}}><div style={{fontSize:12,fontWeight:600,color:T.slate,marginBottom:5}}>{label}</div><input type={type} value={f[k]} onChange={e=>u(k,e.target.value)} placeholder={ph} style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'1.5px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.05)',color:T.white,fontSize:14}} onFocus={e=>e.target.style.borderColor=T.teal+'66'} onBlur={e=>e.target.style.borderColor='rgba(255,255,255,0.1)'}/></div>);
  return(
    <div className="fi" style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',backdropFilter:'blur(6px)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div className="up" style={{background:`linear-gradient(180deg,${T.navyL},${T.navyMid})`,borderRadius:'24px 24px 0 0',width:'100%',maxWidth:480,maxHeight:'92vh',overflowY:'auto',padding:'18px 20px 32px',border:'1px solid rgba(255,255,255,0.1)'}}>
        <div style={{width:36,height:4,background:'rgba(255,255,255,0.2)',borderRadius:2,margin:'0 auto 18px'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
          <div style={{fontFamily:'Outfit',fontWeight:800,fontSize:17}}>{t.newFood}</div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)',borderRadius:20,width:36,height:36,cursor:'pointer',color:T.white,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        <R label={t.newFoodName} k="n" type="text" ph={t.exFood}/>
        <R label={t.newFoodHC}   k="hc" ph="0"/>
        <R label={t.newFoodCal}  k="cal" ph="0"/>
        <R label={t.newFoodFat}  k="fat" ph="0"/>
        <R label={t.newFoodPro}  k="pro" ph="0"/>
        <R label={t.newFoodFib}  k="fib" ph="0"/>
        <R label={t.newFoodGI}   k="gi" ph="0"/>
        <R label={t.newFoodEmoji} k="e" type="text" ph="🍽️"/>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:600,color:T.slate,marginBottom:6}}>{t.newFoodCat}</div>
          <select value={f.c} onChange={e=>u('c',e.target.value)} style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'1.5px solid rgba(255,255,255,0.1)',background:T.navyL,color:T.white,fontSize:14}}>
            {CATS.filter(c=>c.id!=='all').map(c=><option key={c.id} value={c.id}>{c.i} {t[c.k]}</option>)}
          </select>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,color:T.slate,marginBottom:6}}>{t.newFoodUnit}</div>
          <div style={{display:'flex',gap:8}}>
            {['g','ml'].map(v=>(<button key={v} onClick={()=>u('u',v)} style={{flex:1,padding:'12px',borderRadius:12,border:`1.5px solid ${f.u===v?T.teal:'rgba(255,255,255,0.1)'}`,background:f.u===v?`${T.teal}22`:'transparent',color:f.u===v?T.teal:T.slate,fontWeight:700,cursor:'pointer',fontSize:16,fontFamily:'Outfit'}}>{v}</button>))}
          </div>
        </div>
        <button onClick={()=>{if(!f.n||!f.hc)return;onSave({...f,hc:parseFloat(f.hc)||0,cal:parseFloat(f.cal)||0,fat:parseFloat(f.fat)||0,pro:parseFloat(f.pro)||0,fib:parseFloat(f.fib)||0,gi:parseInt(f.gi)||0});}} style={{width:'100%',padding:'15px',background:`linear-gradient(135deg,${T.teal},#0077A8)`,color:T.white,border:'none',borderRadius:16,fontSize:16,fontWeight:800,cursor:'pointer',fontFamily:'Outfit',boxShadow:`0 6px 20px rgba(0,180,216,0.3)`}}>{t.saveFood}</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
